name: Deploy to Yandex Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # Используем официальный образ Яндекса с установленным CLI и Docker
    container: cr.yandex/yc-cli:latest
    
    # Нужно включить Docker-in-Docker, так как мы внутри контейнера
    services:
      docker:
        image: docker:dind
        options: --privileged

    env:
      YC_SA_KEY: ${{ secrets.YC_SA_KEY }} # Если будешь использовать JSON ключ
      YC_API_KEY: ${{ secrets.YC_API_KEY }} # Или API ключ
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
      YC_SA_ID: ${{ secrets.YC_SA_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Устанавливаем Docker CLI внутри контейнера yc-cli
      - name: Install Docker CLI
        run: |
          apk add --no-cache docker-cli

      - name: Start Docker Daemon
        run: |
          dockerd &
          sleep 5

      - name: Authenticate with API Key
        run: |
          echo "Authenticating..."
          # Инициализируем профиль (можно без имени, если он один)
          yc config set --token $(yc iam create-token --api-key "$YC_API_KEY")
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Login to Yandex Container Registry
        run: |
          echo "Logging in to registry..."
          yc cr registry docker-credential-helper --registry-id "$YC_REGISTRY_ID" | docker login --username json_key --password-stdin cr.yandex

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=cr.yandex/$YC_REGISTRY_ID/portfolio:${{ github.sha }}
          echo "Building image: $IMAGE_TAG"
          docker build -t "$IMAGE_TAG" .
          echo "Pushing image..."
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          echo "Deploying to Cloud Run..."
          yc serverless container revision deploy \
            --service-name insaf-portfolio \
            --image "$IMAGE_TAG" \
            --memory 128MB \
            --cores 0.5 \
            --cores-fraction 0.5 \
            --execution-timeout 30s \
            --folder-id "$YC_FOLDER_ID" \
            --service-account-id "$YC_SA_ID" \
            --public
