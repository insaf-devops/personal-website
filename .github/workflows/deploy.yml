name: Deploy to Yandex Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      YC_API_KEY: ${{ secrets.YC_API_KEY }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
      YC_SA_ID: ${{ secrets.YC_SA_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Yandex Cloud CLI
        run: |
          echo "Installing YC CLI..."
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          export PATH="$HOME/yandex-cloud/bin:$PATH"
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
          yc version

      - name: Authenticate with Service Account Key
        run: |
          echo "Authenticating with SA key..."
          # Сохраняем JSON ключ во временный файл
          echo '${{ secrets.YC_SA_KEY }}' > sa-key.json
          
          # Создаём пустой профиль (если ещё не создан)
          yc config profile create github-deployer 2>/dev/null || true
          
          # Активируем профиль
          yc config profile activate github-deployer
          
          # Устанавливаем сервисный аккаунт через JSON ключ
          yc config set service-account-key sa-key.json
          
          # Устанавливаем cloud-id
          yc config set cloud-id "$YC_CLOUD_ID"
          
          # Устанавливаем фолдер по умолчанию
          yc config set folder-id "$YC_FOLDER_ID"
          
          # Проверяем, что всё работает
          echo "Testing authentication..."
          yc resource-manager folder list --format json
          
          # Очищаем ключ после использования
          rm sa-key.json
          
          echo "✅ Authentication successful!"

      - name: Configure Docker for Yandex Registry
        run: |
          echo "Configuring Docker credential helper for Yandex Cloud..."
          # Настраиваем credential helper
          yc container registry configure-docker
          
          # Проверяем, что настройки применились
          echo "Docker config after setup:"
          cat ~/.docker/config.json | head -20 || true
          
          echo "✅ Docker credential helper configured successfully!"

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=cr.yandex/$YC_REGISTRY_ID/portfolio:${{ github.sha }}
          echo "Building image: $IMAGE_TAG"
          docker build -t "$IMAGE_TAG" .
          echo "Pushing image..."
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "✅ Image built and pushed successfully!"

      - name: Ensure container exists
        run: |
          echo "Creating container if it doesn't exist..."
          yc serverless container create \
            --name insaf-portfolio \
            --folder-id "$YC_FOLDER_ID" || true
          echo "✅ Container ready"

      - name: Deploy to Cloud Run
        run: |
          echo "Deploying new revision to Cloud Run..."
          
          # Пробуем деплой с service-account-id (теперь должно работать с ролью iam.serviceAccounts.user)
          yc serverless container revision deploy \
            --container-name insaf-portfolio \
            --image "$IMAGE_TAG" \
            --memory 128MB \
            --cores 1 \
            --execution-timeout 30s \
            --folder-id "$YC_FOLDER_ID" \

          
          echo "✅ Deployment successful!"

      - name: Make container public
        run: |
          echo "Making container public..."
          yc serverless container allow-unauthenticated-invoke \
            --name insaf-portfolio \
            --folder-id "$YC_FOLDER_ID"
          
          # Получаем URL контейнера
          CONTAINER_URL="https://insaf-portfolio.containers.yandexcloud.net"
          echo "✅ Container is now public!"
          echo "🔗 Invoke URL: $CONTAINER_URL"
          
          # Сохраняем URL для вывода
          echo "CONTAINER_URL=$CONTAINER_URL" >> $GITHUB_ENV

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          echo "Container URL: $CONTAINER_URL"
          echo "You can test it with: curl $CONTAINER_URL"
          
          # Получаем информацию о последней ревизии
          yc serverless container revision list \
            --container-name insaf-portfolio \
            --folder-id "$YC_FOLDER_ID" \
            --limit 1 \
            --format json | jq '.[0] | {id: .id, status: .status, createdAt: .created_at, image: .image}' || true
          
          echo "✅ Deployment verified!"

      - name: Deployment summary
        run: |
          echo "🎉 ========================================="
          echo "🎉 DEPLOYMENT COMPLETED SUCCESSFULLY!"
          echo "🎉 ========================================="
          echo "📦 Image: $IMAGE_TAG"
          echo "🌐 URL: $CONTAINER_URL"
          echo "📁 Folder: $YC_FOLDER_ID"
          echo "🆔 Container: insaf-portfolio"
          echo "🎉 ========================================="
