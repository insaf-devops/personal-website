name: Deploy to Yandex Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      YC_API_KEY: ${{ secrets.YC_API_KEY }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
      YC_SA_ID: ${{ secrets.YC_SA_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Yandex Cloud CLI
        run: |
          echo "Installing YC CLI..."
          # Скачиваем официальный скрипт установки
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          # Добавляем yc в PATH для текущей сессии
          export PATH="$HOME/yandex-cloud/bin:$PATH"
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
          # Проверяем версию
          yc version

      - name: Authenticate with Service Account Key
        run: |
          echo "Authenticating with SA key..."
          # Сохраняем JSON ключ в файл
          echo '${{ secrets.YC_SA_KEY }}' > sa-key.json
          
          # Создаём профиль с сервисным ключом
          yc config profile create github-deployer --service-account-key sa-key.json
          
          # Устанавливаем фолдер по умолчанию
          yc config set folder-id "$YC_FOLDER_ID"
          
          # Проверяем авторизацию
          yc config profile list
          
          # Очищаем ключ после использования
          rm sa-key.json
          
          echo "Authentication successful!"

      - name: Login to Yandex Container Registry
        run: |
          echo "Logging in to registry..."
          yc cr registry docker-credential-helper --registry-id "$YC_REGISTRY_ID" | docker login --username json_key --password-stdin cr.yandex

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=cr.yandex/$YC_REGISTRY_ID/portfolio:${{ github.sha }}
          echo "Building image: $IMAGE_TAG"
          docker build -t "$IMAGE_TAG" .
          echo "Pushing image..."
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          echo "Deploying to Cloud Run..."
          yc serverless container revision deploy \
            --service-name insaf-portfolio \
            --image "$IMAGE_TAG" \
            --memory 128MB \
            --cores 0.5 \
            --cores-fraction 0.5 \
            --execution-timeout 30s \
            --folder-id "$YC_FOLDER_ID" \
            --service-account-id "$YC_SA_ID" \
            --public
