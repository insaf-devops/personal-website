name: Deploy to Yandex Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Yandex Cloud CLI
        uses: yandex-cloud/actions/setup-cli@v1

      - name: Login to Yandex Cloud
        run: |
          echo '${{ secrets.YC_SA_KEY }}' > sa-key.json
          yc config serviceaccount --service-account-key sa-key.json

      - name: Login to Yandex Container Registry
        run: |
          yc cr registry docker-credential-helper --registry-id ${{ secrets.YC_REGISTRY_ID }} | docker login --username json_key --password-stdin cr.yandex

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/portfolio:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          yc serverless container revision deploy \
            --service-name insaf-portfolio \
            --image ${{ env.IMAGE_TAG }} \
            --memory 128MB \
            --cores 0.5 \
            --cores-fraction 0.5 \
            --execution-timeout 30s \
            --folder-id ${{ secrets.YC_FOLDER_ID }} \
            --service-account-id ${{ secrets.YC_SA_ID }}
