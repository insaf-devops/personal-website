name: Deploy to Yandex Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      YC_API_KEY: ${{ secrets.YC_API_KEY }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
      YC_SA_ID: ${{ secrets.YC_SA_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Yandex Cloud CLI
        run: |
          echo "Installing YC CLI..."
          # Пробуем несколько источников
          if curl -fsSL https://storage.yandexcloud.net/cloud-cli/latest/yc-linux-amd64.tar.gz -o yc.tar.gz 2>/dev/null; then
            tar -xzf yc.tar.gz
            sudo mv yc /usr/local/bin/
            rm yc.tar.gz
          else
            # Фолбэк: используем готовый бинарник с другого зеркала
            curl -fsSL https://github.com/yandex-cloud/cli/releases/latest/download/yc-linux-amd64.tar.gz -o yc.tar.gz
            tar -xzf yc.tar.gz
            sudo mv yc /usr/local/bin/
            rm yc.tar.gz
          fi
          yc version

      - name: Authenticate with API Key
        run: |
          echo "Authenticating..."
          IAM_TOKEN=$(yc iam create-token --api-key "$YC_API_KEY")
          yc config set --token "$IAM_TOKEN"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Login to Yandex Container Registry
        run: |
          echo "Logging in to registry..."
          yc cr registry docker-credential-helper --registry-id "$YC_REGISTRY_ID" | docker login --username json_key --password-stdin cr.yandex

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=cr.yandex/$YC_REGISTRY_ID/portfolio:${{ github.sha }}
          echo "Building image: $IMAGE_TAG"
          docker build -t "$IMAGE_TAG" .
          echo "Pushing image..."
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          echo "Deploying to Cloud Run..."
          yc serverless container revision deploy \
            --service-name insaf-portfolio \
            --image "$IMAGE_TAG" \
            --memory 128MB \
            --cores 0.5 \
            --cores-fraction 0.5 \
            --execution-timeout 30s \
            --folder-id "$YC_FOLDER_ID" \
            --service-account-id "$YC_SA_ID" \
            --public
